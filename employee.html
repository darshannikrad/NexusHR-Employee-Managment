<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directory — NexusHR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<nav class="navbar" id="navbar"></nav>

<main style="position:relative;z-index:1;">
  <div class="page-header">
    <div class="page-eyebrow">Employee Directory</div>
    <h1 class="page-title">Your Team</h1>
    <p class="page-sub">All active employees — live from DynamoDB</p>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Search by name, role, department…">
    </div>
    <div class="count-badge" id="countBadge">Loading…</div>
  </div>

  <div class="employee-grid-wrap">
    <div class="employee-grid" id="employeeGrid">
      <div class="skeleton-card">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px">
          <div class="skeleton sk-avatar"></div>
          <div style="flex:1"><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line-sm"></div></div>
        </div>
        <div class="skeleton sk-line"></div><div class="skeleton sk-line" style="width:80%"></div>
      </div>
      <div class="skeleton-card">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px">
          <div class="skeleton sk-avatar"></div>
          <div style="flex:1"><div class="skeleton sk-line" style="width:60%"></div><div class="skeleton sk-line-sm"></div></div>
        </div>
        <div class="skeleton sk-line"></div><div class="skeleton sk-line" style="width:90%"></div>
      </div>
      <div class="skeleton-card">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px">
          <div class="skeleton sk-avatar"></div>
          <div style="flex:1"><div class="skeleton sk-line" style="width:75%"></div><div class="skeleton sk-line-sm"></div></div>
        </div>
        <div class="skeleton sk-line"></div><div class="skeleton sk-line" style="width:65%"></div>
      </div>
    </div>
  </div>
</main>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>⚠️ Remove Employee?</h3>
    <p>This will permanently delete <span class="modal-id" id="modalEmpId"></span> from the system. This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm-del" id="confirmDelBtn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<footer class="footer">
  <div class="footer-inner">NexusHR — Built with ❤️ by Yash Nimbalkar</div>
</footer>

<script src="auth.js"></script>
<script>
requireAuth();
buildNavbar("employee.html");

let allEmployees = [];
let pendingDeleteId = null;

const DEPT_COLORS = { Engineering: "blue", HR: "teal", Finance: "amber", Marketing: "teal", Sales: "amber", Design: "blue" };
function deptColor(d) { return DEPT_COLORS[d] || "blue"; }
function initials(n)  { return n ? n.split(" ").map(w => w[0]).slice(0,2).join("").toUpperCase() : "?"; }

function renderCards(list) {
  const grid  = document.getElementById("employeeGrid");
  const badge = document.getElementById("countBadge");
  badge.textContent = `${list.length} employee${list.length !== 1 ? "s" : ""}`;

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🏙️</div>
        <h3>No employees found</h3>
        <p>Try a different search or <a href="operations.html" style="color:var(--accent)">add new employees</a>.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map((emp, i) => `
    <div class="emp-card" style="animation-delay:${i * 0.055}s">
      <div class="emp-card-header">
        ${emp.photoUrl
          ? `<img src="${emp.photoUrl}" class="emp-avatar" alt="${emp.name}">`
          : `<div class="emp-avatar-placeholder">${initials(emp.name)}</div>`}
        <div>
          <div class="emp-name">${emp.name ?? "—"}</div>
          <div class="emp-role">${emp.role ?? "—"}</div>
        </div>
      </div>
      <div class="emp-card-body">
        <div class="emp-meta-row">
          <span class="emp-meta-icon">✉️</span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${emp.email ?? "—"}</span>
        </div>
        <div class="emp-meta-row">
          <span class="emp-meta-icon">🏢</span>
          <span class="dept-badge ${deptColor(emp.department)}">${emp.department ?? "—"}</span>
        </div>
        <div class="emp-meta-row">
          <span class="emp-meta-icon">🪪</span>
          <span class="emp-id-badge">${emp.empID ?? "—"}</span>
        </div>
      </div>
      <div class="emp-card-footer">
        <button class="btn-danger" onclick="openDeleteModal('${emp.empID}')">🗑️ Remove</button>
      </div>
    </div>`).join("");
}

async function loadAll() {
  try {
    const res  = await fetch(API_URL);
    const raw  = await res.json();
    allEmployees = Array.isArray(raw.employees) ? raw.employees : (Array.isArray(raw) ? raw : []);
    renderCards(allEmployees);
  } catch(e) {
    document.getElementById("employeeGrid").innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Could not load employees</h3><p>${e.message}</p></div>`;
    document.getElementById("countBadge").textContent = "Error";
  }
}

document.getElementById("searchInput").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  renderCards(allEmployees.filter(e =>
    [e.name, e.role, e.department, e.email, e.empID].some(f => f?.toLowerCase().includes(q))
  ));
});

function openDeleteModal(id) {
  pendingDeleteId = id;
  document.getElementById("modalEmpId").textContent = id;
  document.getElementById("deleteModal").classList.add("open");
}
function closeModal() {
  document.getElementById("deleteModal").classList.remove("open");
  pendingDeleteId = null;
}
async function confirmDelete() {
  if (!pendingDeleteId) return;
  const btn = document.getElementById("confirmDelBtn");
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;
  try {
    const res = await fetch(API_URL, {
      method: "DELETE", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ empID: pendingDeleteId })
    });
    if (!res.ok) throw new Error();
    showToast("Employee removed successfully", "success");
    closeModal();
    await loadAll();
  } catch {
    showToast("Failed to delete employee", "error");
  } finally {
    btn.innerHTML = "Delete"; btn.disabled = false;
  }
}
document.getElementById("deleteModal").addEventListener("click", e => { if (e.target.id === "deleteModal") closeModal(); });

loadAll();
</script>
</body>
</html>
