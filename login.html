<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — NexusHR</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" style="position:fixed;top:20px;right:20px">🌙</button>

<div class="auth-screen">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-icon">N</div>
      <div class="auth-logo-name">NexusHR</div>
    </div>

    <div class="auth-error" id="authError"></div>

    <!-- ===== SIGN IN FORM ===== -->
    <div id="loginForm">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to continue</div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-submit" id="loginBtn" onclick="doLogin()">Sign In</button>

      <div style="margin-top:14px; font-size:12px; color:var(--text-muted, #888); text-align:center;">
        🔒 Access is granted by your administrator.
      </div>
    </div>

    <!-- ===== NEW PASSWORD FORM =====
         Shown automatically on first login when admin created the account.
         Replaces the insecure browser prompt().
    -->
    <div id="newPasswordForm" style="display:none">
      <div class="auth-title">Set your password</div>
      <div class="auth-sub">
        Your administrator created this account.<br>Please choose a new password to continue.
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" id="newPassword"
          placeholder="Min 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirmPassword"
          placeholder="Repeat password" autocomplete="new-password">
      </div>

      <button class="btn-submit" id="newPasswordBtn" onclick="doSetNewPassword()">
        Set Password &amp; Sign In
      </button>
    </div>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="auth.js"></script>
<script>
  // Already logged in? go home
  if (getToken()) window.location.href = "index.html";

  function showError(msg) {
    const el = document.getElementById("authError");
    el.textContent = msg;
    el.classList.add("show");
    el.style.display = "block";
  }
  function clearError() {
    const el = document.getElementById("authError");
    el.textContent = "";
    el.classList.remove("show");
    el.style.display = "none";
  }

  /* ---- SIGN IN ---- */
  async function doLogin() {
    clearError();
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const btn      = document.getElementById("loginBtn");

    if (!email || !password) { showError("Enter email and password."); return; }

    btn.innerHTML = '<div class="spinner"></div> Signing in…';
    btn.disabled = true;

    try {
      const result = await login(email, password);

      if (result.challenge === "NEW_PASSWORD_REQUIRED") {
        // Swap to the inline password-change form — no prompt()
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("newPasswordForm").style.display = "";
        return;
      }

      if (result.success) {
        showToast("Welcome back! 👋", "success");
        setTimeout(() => { window.location.href = "index.html"; }, 700);
        return;
      }

      showError(result.message || "Invalid credentials.");
    } catch (err) {
      console.error(err);
      showError("Login failed. Please try again.");
    }

    btn.innerHTML = "Sign In";
    btn.disabled = false;
  }

  /* ---- SET NEW PASSWORD (first-time login) ---- */
  async function doSetNewPassword() {
    clearError();
    const newPw  = document.getElementById("newPassword").value;
    const confPw = document.getElementById("confirmPassword").value;
    const btn    = document.getElementById("newPasswordBtn");

    if (!newPw || !confPw)   { showError("Please fill in both fields."); return; }
    if (newPw.length < 8)    { showError("Password must be at least 8 characters."); return; }
    if (newPw !== confPw)    { showError("Passwords do not match."); return; }

    btn.innerHTML = '<div class="spinner"></div> Setting password…';
    btn.disabled = true;

    try {
      const result = await respondToNewPassword(newPw);

      if (result.success) {
        showToast("Password set! Welcome 🎉", "success");
        setTimeout(() => { window.location.href = "index.html"; }, 700);
        return;
      }

      showError(result.message || "Failed to set password.");
    } catch (err) {
      console.error(err);
      showError("Something went wrong. Please try again.");
    }

    btn.innerHTML = "Set Password & Sign In";
    btn.disabled = false;
  }

  /* ---- Enter key support ---- */
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const newPwVisible = document.getElementById("newPasswordForm").style.display !== "none";
    if (newPwVisible) doSetNewPassword(); else doLogin();
  });
</script>
</body>
</html>
