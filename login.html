<!DOCTYPE html>
<html>
<head>
  <title>NexusHR Login</title>
  <style>
    body {
      background: #0b1c2c;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .card {
      background: #1c2f45;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #4f7cff;
      color: white;
    }

    .error {
      background: red;
      padding: 8px;
      display: none;
    }

    .wrapper {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 10px;
      top: 35%;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <div class="error" id="errorBox"></div>

  <input id="email" placeholder="Email or Username">

  <div class="wrapper">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle" onclick="toggle()">Show</span>
  </div>

  <button onclick="login()">Sign In</button>
</div>

<script src="auth.js"></script>

<script>
function toggle() {
  const p = document.getElementById("password");
  const t = event.target;
  if (p.type === "password") {
    p.type = "text";
    t.innerText = "Hide";
  } else {
    p.type = "password";
    t.innerText = "Show";
  }
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.innerText = msg;
  box.style.display = "block";
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {
    await loginUser(email, password);
    window.location.href = "index.html";
  } catch (e) {
    showError(e.message);
  }
}
</script>

</body>
</html>
