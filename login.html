<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NexusHR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="brand-dot"></span>NexusHR
    </div>
    <h2>Welcome back</h2>
    <p>Sign in to your account to continue</p>

    <div class="login-error" id="errorBox"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input" placeholder="you@company.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        <button class="pw-toggle" type="button" onclick="togglePw()">Show</button>
      </div>
    </div>

    <button class="btn-submit" onclick="login()" id="loginBtn" style="margin-top:8px">Sign In</button>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // If already logged in, skip straight to home
  (function() {
    const pool = getUserPool && getUserPool();
    if (pool) {
      const u = pool.getCurrentUser();
      if (u) u.getSession((err, s) => { if (!err && s && s.isValid()) window.location.href = "index.html"; });
    }
  })();

  function togglePw() {
    const p = document.getElementById("password");
    const b = event.currentTarget;
    p.type = p.type === "password" ? "text" : "password";
    b.textContent = p.type === "password" ? "Show" : "Hide";
  }

  function showError(msg) {
    const box = document.getElementById("errorBox");
    box.textContent = msg;
    box.style.display = "block";
  }

  async function login() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");

    if (!email || !password) { showError("Please enter your email and password."); return; }

    btn.innerHTML  = '<span class="spinner"></span> Signing in…';
    btn.disabled   = true;
    document.getElementById("errorBox").style.display = "none";

    try {
      await loginUser(email, password);
      window.location.href = "index.html";
    } catch (e) {
      showError(e.message);
      btn.textContent = "Sign In";
      btn.disabled    = false;
    }
  }

  // Allow Enter key to submit
  document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
